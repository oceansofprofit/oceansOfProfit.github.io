  function sleep(ms) {
    console.log("Sleeping for", ms, "ms");
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function sendWithBot(baseUrl, chatId, headline, message, file) {
    if (file) {
      const formData = new FormData();
      formData.append("chat_id", chatId);
      formData.append("caption", `<b>${headline}</b>\n${message}`);
      formData.append("parse_mode", "HTML");

      const file_type = file.type;
      if (file_type.startsWith("image/") && file_type !== "image/gif") {
        formData.append("photo", file);
        return fetch(baseUrl + "/sendPhoto", { method: "POST", body: formData });
      } else if (file_type === "image/gif") {
        formData.append("animation", file);
        return fetch(baseUrl + "/sendAnimation", { method: "POST", body: formData });
      } else if (file_type.startsWith("video/")) {
        formData.append("video", file);
        return fetch(baseUrl + "/sendVideo", { method: "POST", body: formData });
      } else {
        formData.append("document", file);
        return fetch(baseUrl + "/sendDocument", { method: "POST", body: formData });
      }
    } else {
      const url =
        baseUrl +
        "/sendMessage?chat_id=" + encodeURIComponent(chatId) +
        "&text=" + encodeURIComponent(`<b>${headline}</b>\n${message}`) +
        "&parse_mode=HTML";

      return fetch(url);
    }
  }
  
  document.getElementById('submitBtn').addEventListener('click', async function () {
    const headline = document.getElementById('headline').value;
    const message = document.getElementById('message').value;
    const imageInput = document.getElementById('imageInput');
    const file = imageInput.files[0];
    const options = Array.from(document.querySelectorAll('#options option:checked')).map(option => ({
  value: option.value,
  text: option.textContent.trim()
}));
    const totalMessages = options.length;
    let messagesSent = 0;

    const telegramUrl = "https://api.telegram.org/bot";
    const BOT_TOKENS = ["8272993368:AAGA6x2-rz5rlffjmjLYeHIYSLbvXLREI2Q", "8229618273:AAEPzlbU43CXEh7it_0M-d8qW6qrB_GL1bc", "8340077240:AAE681eyCUt6A7Xio4AT6CwkJyo4sJjmUiw"]

    const BATCH_SIZE = 18;
    let botIndex = 0; 
    let batchCounter = 0;
    let countPass = 0;
    let failureMessage = "";

    for (let i = 0; i < options.length; i++) {
      const chatId = options[i].value;
      document.getElementById("status").innerText = `Sending Message in group: ${i + 1}`;

      let currentBot = BOT_TOKENS[botIndex];
      let res, data;

      try {
        // First attempt
        res = await sendWithBot(telegramUrl+currentBot, chatId, headline, message, file);
        data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error("Telegram API rejected (likely 429).");
        }

        countPass++;
      } 
      catch (err) {
        console.warn("Error for bot:", currentBot, err);

        // Switch bot immediately
        botIndex = (botIndex + 1) % BOT_TOKENS.length;
        currentBot = BOT_TOKENS[botIndex];
        batchCounter = 0;
        // await sleep(5000);

        // Retry with next bot
        try {
          res = await sendWithBot(telegramUrl+currentBot, chatId, headline, message, file);
          data = await res.json();
          if (res.ok && data.ok) {
            countPass++;
          } else {
            failureMessage=failureMessage+"\n"+options[i].text
            console.error("Retry failed for chat:", chatId);
          }
        } catch (retryErr) {
          console.error("Retry also failed:", retryErr);
        }
      }

      batchCounter++;

      if (batchCounter >= BATCH_SIZE) {
        batchCounter = 0;
        botIndex = (botIndex + 1) % BOT_TOKENS.length;
        // if (botIndex === 0) {
        //   await sleep(5000);
        // }
      }
    }

    document.getElementById('message').value = "";
    document.getElementById('headline').value = "";
    document.getElementById('imageInput').value = "";
    document.getElementById("status").innerText = "";
    alert("Message sent successfully for " + countPass + " groups\nNot Able to send message for \n" + failureMessage);
